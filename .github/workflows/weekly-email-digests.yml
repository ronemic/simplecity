name: Weekly email digests

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

env:
  CI: true
  NEXT_PUBLIC_APP_URL: https://simplecity.app
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
  RESEND_REPLY_TO_EMAIL: ${{ secrets.RESEND_REPLY_TO_EMAIL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_FOSTER_CITY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_FOSTER_CITY_SUPABASE_URL }}
  NEXT_PUBLIC_FOSTER_CITY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_FOSTER_CITY_SUPABASE_ANON_KEY }}
  FOSTER_CITY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.FOSTER_CITY_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_URL }}
  NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_ANON_KEY }}
  SAN_MATEO_CITY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SAN_MATEO_CITY_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SAN_MATEO_COUNTY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_COUNTY_SUPABASE_URL }}
  NEXT_PUBLIC_SAN_MATEO_COUNTY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_COUNTY_SUPABASE_ANON_KEY }}
  SAN_MATEO_COUNTY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SAN_MATEO_COUNTY_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SANTA_CLARA_COUNTY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SANTA_CLARA_COUNTY_SUPABASE_URL }}
  NEXT_PUBLIC_SANTA_CLARA_COUNTY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SANTA_CLARA_COUNTY_SUPABASE_ANON_KEY }}
  SANTA_CLARA_COUNTY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SANTA_CLARA_COUNTY_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_MOUNTAIN_VIEW_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_MOUNTAIN_VIEW_SUPABASE_URL }}
  NEXT_PUBLIC_MOUNTAIN_VIEW_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_MOUNTAIN_VIEW_SUPABASE_ANON_KEY }}
  MOUNTAIN_VIEW_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MOUNTAIN_VIEW_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SAN_FRANCISCO_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SAN_FRANCISCO_SUPABASE_URL }}
  NEXT_PUBLIC_SAN_FRANCISCO_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SAN_FRANCISCO_SUPABASE_ANON_KEY }}
  SAN_FRANCISCO_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SAN_FRANCISCO_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_MENLO_PARK_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_MENLO_PARK_SUPABASE_URL }}
  NEXT_PUBLIC_MENLO_PARK_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_MENLO_PARK_SUPABASE_ANON_KEY }}
  MENLO_PARK_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MENLO_PARK_SUPABASE_SERVICE_ROLE_KEY }}

permissions:
  contents: read

jobs:
  weekly-email-digests:
    name: Send weekly email digests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: weekly-email-digests
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send digests
        run: npm run email:digests
