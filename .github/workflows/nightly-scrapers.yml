name: Nightly scrapers

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "30 10 * * *"
    - cron: "0 11 * * *"
    - cron: "15 11 * * *"
    - cron: "20 12 * * *"
    - cron: "40 12 * * *"
  workflow_dispatch:
    inputs:
      jurisdiction:
        description: "Jurisdiction to scrape"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - san-mateo-city
          - san-mateo-county
          - foster-city
          - santa-clara-county
          - mountain-view
          - san-francisco

env:
  CI: true
  NEXT_PUBLIC_APP_URL: https://simplecity.app
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_NORTH_SAN_MATEO_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_NORTH_SAN_MATEO_SUPABASE_URL }}
  NEXT_PUBLIC_NORTH_SAN_MATEO_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_NORTH_SAN_MATEO_SUPABASE_ANON_KEY }}
  NORTH_SAN_MATEO_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORTH_SAN_MATEO_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SOUTH_SAN_MATEO_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SOUTH_SAN_MATEO_SUPABASE_URL }}
  NEXT_PUBLIC_SOUTH_SAN_MATEO_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SOUTH_SAN_MATEO_SUPABASE_ANON_KEY }}
  SOUTH_SAN_MATEO_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SOUTH_SAN_MATEO_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SANTA_CLARA_REGION_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SANTA_CLARA_REGION_SUPABASE_URL }}
  NEXT_PUBLIC_SANTA_CLARA_REGION_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SANTA_CLARA_REGION_SUPABASE_ANON_KEY }}
  SANTA_CLARA_REGION_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SANTA_CLARA_REGION_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_FOSTER_CITY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_FOSTER_CITY_SUPABASE_URL }}
  NEXT_PUBLIC_FOSTER_CITY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_FOSTER_CITY_SUPABASE_ANON_KEY }}
  FOSTER_CITY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.FOSTER_CITY_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_URL }}
  NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_ANON_KEY }}
  SAN_MATEO_CITY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SAN_MATEO_CITY_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SAN_MATEO_COUNTY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_COUNTY_SUPABASE_URL }}
  NEXT_PUBLIC_SAN_MATEO_COUNTY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_COUNTY_SUPABASE_ANON_KEY }}
  SAN_MATEO_COUNTY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SAN_MATEO_COUNTY_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SANTA_CLARA_COUNTY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SANTA_CLARA_COUNTY_SUPABASE_URL }}
  NEXT_PUBLIC_SANTA_CLARA_COUNTY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SANTA_CLARA_COUNTY_SUPABASE_ANON_KEY }}
  SANTA_CLARA_COUNTY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SANTA_CLARA_COUNTY_SUPABASE_SERVICE_ROLE_KEY }}
  SANTA_CLARA_COUNTY_IQM2_URL: https://sccgov.iqm2.com/Citizens/Default.aspx?frame=no
  NEXT_PUBLIC_MOUNTAIN_VIEW_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_MOUNTAIN_VIEW_SUPABASE_URL }}
  NEXT_PUBLIC_MOUNTAIN_VIEW_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_MOUNTAIN_VIEW_SUPABASE_ANON_KEY }}
  MOUNTAIN_VIEW_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MOUNTAIN_VIEW_SUPABASE_SERVICE_ROLE_KEY }}
  MOUNTAIN_VIEW_LEGISTAR_URL: https://mountainview.legistar.com/Calendar.aspx
  NEXT_PUBLIC_SAN_FRANCISCO_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SAN_FRANCISCO_SUPABASE_URL }}
  NEXT_PUBLIC_SAN_FRANCISCO_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SAN_FRANCISCO_SUPABASE_ANON_KEY }}
  SAN_FRANCISCO_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SAN_FRANCISCO_SUPABASE_SERVICE_ROLE_KEY }}
  SAN_FRANCISCO_LEGISTAR_URL: https://sfgov.legistar.com/Calendar.aspx
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
  CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
  CEREBRAS_MODEL: ${{ secrets.CEREBRAS_MODEL || 'gpt-oss-120b' }}

permissions:
  contents: read

jobs:
  san-mateo-city:
    name: San Mateo scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.jurisdiction == 'all' || inputs.jurisdiction == 'san-mateo-city')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *')
    concurrency:
      group: nightly-scraper-san-mateo-city
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Run San Mateo pipeline
        run: npm run pipeline:san-mateo-city

  san-mateo-county:
    name: San Mateo County scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.jurisdiction == 'all' || inputs.jurisdiction == 'san-mateo-county')) ||
      (github.event_name == 'schedule' && github.event.schedule == '15 11 * * *')
    concurrency:
      group: nightly-scraper-san-mateo-county
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Run San Mateo County pipeline
        run: npm run pipeline:san-mateo-county

  foster-city:
    name: Foster City scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.jurisdiction == 'all' || inputs.jurisdiction == 'foster-city')) ||
      (github.event_name == 'schedule' && github.event.schedule == '30 10 * * *')
    concurrency:
      group: nightly-scraper-foster-city
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Run Foster City pipeline
        run: npm run pipeline:foster-city

  santa-clara-county:
    name: Santa Clara County scraper
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.jurisdiction == 'all' || inputs.jurisdiction == 'santa-clara-county')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *')
    concurrency:
      group: nightly-scraper-santa-clara-county
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Run Santa Clara County pipeline
        run: npm run pipeline:santa-clara-county -- --max-runtime-minutes=110

  mountain-view:
    name: Mountain View scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.jurisdiction == 'all' || inputs.jurisdiction == 'mountain-view')) ||
      (github.event_name == 'schedule' && github.event.schedule == '20 12 * * *')
    concurrency:
      group: nightly-scraper-mountain-view
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Run Mountain View pipeline
        run: npm run pipeline:mountain-view -- --max-runtime-minutes=50

  san-francisco:
    name: San Francisco scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.jurisdiction == 'all' || inputs.jurisdiction == 'san-francisco')) ||
      (github.event_name == 'schedule' && github.event.schedule == '40 12 * * *')
    concurrency:
      group: nightly-scraper-san-francisco
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Run San Francisco pipeline
        run: npm run pipeline:san-francisco -- --max-runtime-minutes=50
