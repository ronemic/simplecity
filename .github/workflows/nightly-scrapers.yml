name: Nightly scrapers

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch:
    inputs:
      jurisdiction:
        description: "Jurisdiction to scrape"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - san-mateo-city
          - foster-city

env:
  CI: true
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://simplecity.app' }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_FOSTER_CITY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_FOSTER_CITY_SUPABASE_URL }}
  NEXT_PUBLIC_FOSTER_CITY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_FOSTER_CITY_SUPABASE_ANON_KEY }}
  FOSTER_CITY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.FOSTER_CITY_SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_URL }}
  NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SAN_MATEO_CITY_SUPABASE_ANON_KEY }}
  SAN_MATEO_CITY_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SAN_MATEO_CITY_SUPABASE_SERVICE_ROLE_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}

permissions:
  contents: read

jobs:
  san-mateo-city:
    name: San Mateo scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.jurisdiction == 'all' || inputs.jurisdiction == 'san-mateo-city')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *')
    concurrency:
      group: nightly-scraper-san-mateo-city
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Run San Mateo pipeline
        run: npm run pipeline:san-mateo-city

  foster-city:
    name: Foster City scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.jurisdiction == 'all' || inputs.jurisdiction == 'foster-city')) ||
      (github.event_name == 'schedule' && github.event.schedule == '30 10 * * *')
    concurrency:
      group: nightly-scraper-foster-city
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install --with-deps chromium

      - name: Run Foster City pipeline
        run: npm run pipeline:foster-city
